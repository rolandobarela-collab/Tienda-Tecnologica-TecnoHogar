<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Componentes - TecnoHogar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">

<nav class="navbar bg-body-tertiary shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand" style="color: blueviolet; font-weight: bold;" href="index.html">
            <i class="bi bi-shop-window fs-3"></i>
            TecnoHogar 
        </a>

        <div class="d-flex align-items-center">
            <a href="Login.html" title="Mi Cuenta">
                <i class="bi bi-person-circle fs-3 me-4" style="color: blueviolet;"></i>
            </a>
            
            <button type="button" class="btn border-0 position-relative p-0" data-bs-toggle="modal" data-bs-target="#modalCarrito">
                <i class="bi bi-cart3 fs-3" style="color: blueviolet;"></i>
                <span id="carrito-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.7rem;">
                    0
                </span>
            </button>
        </div>
    </div>
</nav>

<div class="container mt-5">
  <div class="mb-4">
    <a href="index.html" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-2"></i>Volver al Inicio
    </a>
  </div>
  <h2 class="text-center mb-4">Componentes</h2>

  <div class="row">
    <div class="col-md-4">
      <div class="card p-3 shadow-sm border-0">
        <h5>Memoria RAM 16GB</h5>
        <p class="fw-bold text-primary">$250.000</p>
        <button onclick="agregarAlCarrito('Memoria RAM 16GB', 250000)" class="btn btn-primary" style="background-color: blueviolet; border:none;">
          Agregar al carrito
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalCarrito" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-cart-fill me-2"></i>Mi Carrito</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead class="table-light">
              <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cant.</th>
                <th>Subtotal</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="items-carrito"></tbody>
          </table>
        </div>
        <div class="text-end mt-3">
          <h4>Total: <span class="text-primary">$</span><span id="total-carrito">0</span></h4>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" id="vaciar-carrito">Vaciar Carrito</button>
        <button type="button" class="btn btn-primary" id="btn-pagar" style="background-color: blueviolet; border:none;">Proceder al Pago</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="Javascript/carrito.js"></script> 

</body>
</html>

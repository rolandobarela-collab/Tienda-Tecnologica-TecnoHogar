{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña - TecnoHogar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="bg-light d-flex align-items-center full-height">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">
          <h3 class="text-center mb-4 fw-bold login-title">
            Nueva contraseña
          </h3>
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Nueva contraseña</label>
              <input type="password" name="new_password1" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Confirmar contraseña</label>
              <input type="password" name="new_password2" class="form-control" required>
            </div>
            {% if form.errors %}
              <div class="alert alert-danger">{{ form.errors }}</div>
            {% endif %}
            <div class="d-grid">
              <button type="submit" class="btn btn-login fw-semibold">Cambiar contraseña</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

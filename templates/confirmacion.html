{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmación - TecnoHogar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="bg-light d-flex align-items-center full-height">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <div class="card shadow border-0 rounded-4 p-5">
        <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
        <h2 class="fw-bold mt-3">¡Compra exitosa!</h2>
        <p class="text-muted">Tu pedido <strong>#{{ pedido_id }}</strong> fue registrado correctamente.</p>
        <a href="/" class="btn btn-primary mt-3" style="background-color: blueviolet; border:none;">Volver al inicio</a>
        <a href="/historial/" class="btn btn-outline-secondary mt-2">Ver mis pedidos</a>
      </div>
    </div>
  </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.min.css">
</body>
</html>

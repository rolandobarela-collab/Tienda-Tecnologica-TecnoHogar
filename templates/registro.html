{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - TecnoHogar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="bg-light d-flex align-items-center full-height">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">

          <h3 class="text-center fw-bold login-title mb-4">Crear cuenta</h3>

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}

          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label>Correo</label>
              <input type="email" name="correo" class="form-control" required>
            </div>
            <div class="mb-3">
              <label>Contraseña</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
              <label>Confirmar contraseña</label>
              <input type="password" name="confirm" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-login w-100">Registrarse</button>

            <p class="text-center mt-3">
              <a href="/login/">¿Ya tienes cuenta?</a>
            </p>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

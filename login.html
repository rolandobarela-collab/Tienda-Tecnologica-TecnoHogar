<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light d-flex align-items-center full-height">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">

      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">

          <h3 class="text-center mb-4 fw-bold login-title">
            <i class="bi bi-person-circle"></i> Inicia sesión en tu cuenta
          </h3>

          <form onsubmit="login(event)">

            <div class="mb-3">
              <label class="form-label fw-semibold">Correo electrónico</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-envelope"></i>
                </span>
                <input type="email" id="correo" class="form-control" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Contraseña</label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock"></i>
                </span>

                <input type="password" class="form-control" id="passwordInput" required>

                <span class="input-group-text toggle-password" onclick="togglePassword()">
                  <i class="bi bi-eye" id="toggleIcon"></i>
                </span>
              </div>

              <a href="recuperar.html" class="forgot-link small">
                ¿Olvidaste tu contraseña?
              </a>
            </div>

            <div class="d-grid">
              <button class="btn btn-login fw-semibold">Iniciar sesión</button>
            </div>

            <p class="text-center mt-3 mb-0">
              <a href="registro.html" class="register-link">
                ¿Eres nuevo en TecnoHogar?
              </a>
            </p>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
function togglePassword() {
  const passwordInput = document.getElementById("passwordInput");
  const toggleIcon = document.getElementById("toggleIcon");

  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    toggleIcon.classList.replace("bi-eye", "bi-eye-slash");
  } else {
    passwordInput.type = "password";
    toggleIcon.classList.replace("bi-eye-slash", "bi-eye");
  }
}

function login(e){
  e.preventDefault();

  let correo = document.getElementById("correo").value;
  let pass = document.getElementById("passwordInput").value;

  let usuario = JSON.parse(localStorage.getItem("usuario"));

  if(!usuario){
    alert("No hay usuarios registrados");
    return;
  }

  if(correo === usuario.correo && pass === usuario.password){
    alert("Bienvenido a TecnoHogar");

    // Guardar sesión activa
    localStorage.setItem("sesion", "activa");

    window.location.href = "index.html";
  } else {
    alert("Correo o contraseña incorrectos");
  }
}
</script>

</body>
</html>

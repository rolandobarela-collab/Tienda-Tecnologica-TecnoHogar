<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light d-flex align-items-center full-height">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">

      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">

          <h3 class="text-center fw-bold login-title mb-4">
            Crear cuenta
          </h3>

          <form onsubmit="registrar(event)">

            <!-- Correo -->
            <div class="mb-3">
              <label>Correo</label>
              <input type="email" id="correo" class="form-control" required>
            </div>

            <!-- Contraseña -->
            <div class="mb-3">
              <label>Contraseña</label>
              <input type="password" id="password" class="form-control" required>
            </div>

            <!-- Confirmar -->
            <div class="mb-3">
              <label>Confirmar contraseña</label>
              <input type="password" id="confirm" class="form-control" required>
            </div>

            <button class="btn btn-login w-100">Registrarse</button>

            <p class="text-center mt-3">
              <a href="login.html">¿Ya tienes cuenta?</a>
            </p>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
function registrar(e){
  e.preventDefault();

  let correo = document.getElementById("correo").value;
  let pass = document.getElementById("password").value;
  let confirm = document.getElementById("confirm").value;

  if(pass !== confirm){
    alert("Las contraseñas no coinciden");
    return;
  }

  // Guardar usuario en localStorage
  let usuario = {
    correo: correo,
    password: pass
  };

  localStorage.setItem("usuario", JSON.stringify(usuario));

  alert("Registro exitoso");

  window.location.href = "login.html";
}
</script>

</body>
</html>

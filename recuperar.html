<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recuperar contraseña</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light d-flex align-items-center full-height">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">

      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">

          <h3 class="text-center fw-bold login-title mb-4">
            Recuperar contraseña
          </h3>

          <form onsubmit="recuperar(event)">

            <div class="mb-3">
              <label class="form-label">Correo electrónico</label>
              <input type="email" id="correo" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Nueva contraseña</label>
              <input type="password" id="nuevaPass" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Confirmar contraseña</label>
              <input type="password" id="confirmPass" class="form-control" required>
            </div>

            <button class="btn btn-login w-100">Actualizar contraseña</button>

            <p class="text-center mt-3">
              <a href="login.html">Volver al login</a>
            </p>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
function recuperar(e){
  e.preventDefault();

  let correo = document.getElementById("correo").value;
  let nueva = document.getElementById("nuevaPass").value;
  let confirm = document.getElementById("confirmPass").value;

  let usuario = JSON.parse(localStorage.getItem("usuario"));

  if(!usuario){
    alert("No hay usuarios registrados");
    return;
  }

  if(correo !== usuario.correo){
    alert("El correo no está registrado");
    return;
  }

  if(nueva !== confirm){
    alert("Las contraseñas no coinciden");
    return;
  }

  if(nueva.length < 6){
    alert("La contraseña debe tener mínimo 6 caracteres");
    return;
  }

  // Simulación de correo
  alert("Se envió un enlace de recuperación a tu correo (simulación)");

  usuario.password = nueva;
  localStorage.setItem("usuario", JSON.stringify(usuario));

  alert("Contraseña actualizada correctamente");

  window.location.href = "login.html";
}
</script>

</body>
</html>
